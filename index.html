<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="炎症薬理">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>炎症と抗炎症薬｜簡易暗記アプリ</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#687387;--line:#dce2ec;--blue:#2563eb;--blue2:#eaf1ff;--green:#087f5b;--green2:#eafaf4;--red:#c2413a;--red2:#fff0ef;--shadow:0 8px 25px rgba(30,50,90,.08)}
*{box-sizing:border-box} html{-webkit-text-size-adjust:100%;background:var(--bg)} body{margin:0;color:var(--ink);background:linear-gradient(180deg,#eef4ff 0,#f7f8fc 270px);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.65}
button,select{font:inherit} button{touch-action:manipulation} .wrap{max-width:720px;margin:auto;padding:18px 14px 42px} header{padding:8px 2px 15px} h1{font-size:1.35rem;margin:0 0 4px} .sub{font-size:.87rem;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0} .stat{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:16px;padding:11px 5px;text-align:center;box-shadow:var(--shadow)} .stat b{font-size:1.25rem;display:block} .stat span{font-size:.76rem;color:var(--muted)}
.panel,.card,.backup{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)} .panel{padding:12px;margin-bottom:12px;display:grid;gap:9px} label.ctrl{font-size:.79rem;color:var(--muted);font-weight:700;display:grid;gap:4px} select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 11px;color:var(--ink)}
.progress{height:8px;border-radius:99px;background:#e8edf5;overflow:hidden} .progress>div{height:100%;width:0;background:var(--blue);transition:width .25s} .smallrow{display:flex;justify-content:space-between;gap:12px;font-size:.78rem;color:var(--muted)}
.card{padding:19px 17px;margin:12px 0} .meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:14px} .pill{display:inline-flex;background:var(--blue2);color:#174ea6;border-radius:99px;padding:4px 9px;font-size:.75rem;font-weight:800} .qno{font-size:.8rem;color:var(--muted)} .question{font-size:1.13rem;font-weight:750;min-height:108px;display:flex;align-items:center}
.answer{display:none;margin-top:14px;border:1px solid #b8cdfb;background:#f4f7ff;border-radius:15px;padding:15px;font-weight:800;font-size:1.06rem} .answer.show{display:block} .answer small{display:block;color:#4770b5;font-size:.74rem;margin-bottom:3px}
.primary{width:100%;border:0;border-radius:14px;padding:13px 12px;background:var(--blue);color:#fff;font-weight:850;font-size:1.02rem;margin-top:12px} .primary.secondary{background:#e9eef8;color:#27344c}
.judge{display:none;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px} .judge.show{display:grid} .judge button{border-radius:14px;padding:12px 8px;font-weight:850;border:1px solid} .know{background:var(--green2);color:var(--green);border-color:#aadfce!important} .unknown{background:var(--red2);color:var(--red);border-color:#f2beb9!important}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0} .nav button{padding:12px 8px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:800} .nav button:disabled{opacity:.4} .empty{display:none;text-align:center;padding:34px 14px;color:var(--muted)}
.notice{display:none;background:#fff7df;border:1px solid #edd58a;border-radius:14px;padding:10px 12px;color:#725c19;font-size:.82rem;margin-bottom:10px} .notice.show{display:block}
.backup{margin-top:16px;padding:13px} summary{font-weight:850;cursor:pointer} .backup p{font-size:.81rem;color:var(--muted)} .backupBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px} .backup button,.fileLabel{border:1px solid var(--line);border-radius:11px;background:#fff;padding:10px;text-align:center;font-weight:750;font-size:.85rem;cursor:pointer} input[type=file]{display:none} footer{text-align:center;color:var(--muted);font-size:.72rem;padding:17px 5px}
@media(min-width:620px){.panel{grid-template-columns:1fr 1fr} .panel .wide{grid-column:1/-1}}
@media(prefers-color-scheme:dark){:root{--bg:#101621;--card:#182130;--ink:#edf3ff;--muted:#a6b2c6;--line:#303c50;--blue2:#1b315b;--green2:#123b32;--red2:#442526;--shadow:none} body{background:linear-gradient(180deg,#17253d 0,#101621 270px)} select,.nav button,.backup button,.fileLabel{background:#182130;color:var(--ink)} .answer{background:#192944;border-color:#36598e} .primary.secondary{background:#2b3545;color:var(--ink)}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>炎症と抗炎症薬</h1><div class="sub">問題と解答だけの簡易暗記アプリ｜画像資料の解答に準拠</div></header>
<div id="storageNotice" class="notice"></div>
<section class="stats" aria-label="学習状況">
 <div class="stat"><b id="totalCount">0</b><span>対象問題</span></div>
 <div class="stat"><b id="judgedCount">0</b><span>判定済み</span></div>
 <div class="stat"><b id="unknownCount">0</b><span>分からない</span></div>
</section>
<section class="panel">
 <label class="ctrl">表示する問題<select id="filter"><option value="all">すべて</option><option value="unseen">未判定だけ</option><option value="unknown">分からない問題だけ</option></select></label>
 <label class="ctrl">分野<select id="category"><option value="all">すべての分野</option><option>生理活性物質</option><option>抗炎症薬・関連薬</option><option>アレルギー治療薬</option></select></label>
 <label class="ctrl wide">出題順<select id="order"><option value="normal">番号順</option><option value="shuffle">シャッフル</option></select></label>
 <div class="wide progress"><div id="progressBar"></div></div><div class="wide smallrow"><span id="positionText">0 / 0</span><span id="progressText">判定済み 0%</span></div>
</section>
<section id="card" class="card">
 <div class="meta"><span id="catPill" class="pill"></span><span id="qNo" class="qno"></span></div>
 <div id="question" class="question"></div>
 <button id="revealBtn" class="primary">解答を見る</button>
 <div id="answer" class="answer"><small>解答</small><span id="answerText"></span></div>
 <div id="judge" class="judge"><button id="knownBtn" class="know">わかった</button><button id="unknownBtn" class="unknown">分からなかった</button></div>
</section>
<div id="empty" class="panel empty">条件に合う問題がありません。<br><button id="resetFilter" class="primary secondary">すべての問題に戻す</button></div>
<div class="nav"><button id="prevBtn">← 前の問題</button><button id="nextBtn">次の問題 →</button></div>
<details class="backup"><summary>保存・バックアップ・リセット</summary><p>判定はこの端末の同じブラウザに自動保存されます。機種変更やブラウザデータ削除に備える場合はバックアップしてください。</p><div class="backupBtns"><button id="exportBtn">データを書き出す</button><label class="fileLabel" for="importFile">データを読み込む</label><input id="importFile" type="file" accept="application/json"><button id="resetBtn">学習記録をリセット</button><button id="reshuffleBtn">再シャッフル</button></div></details>
<footer>全26問｜薬理学「炎症と抗炎症薬」練習問題</footer>
</div>
<script>
'use strict';
const QUESTIONS=[{"id":1,"category":"生理活性物質","question":"ヒスタミンの特徴を答えよ。","answer":"I型アレルギー反応を引き起こすアミン"},{"id":2,"category":"生理活性物質","question":"セロトニンの特徴を答えよ。","answer":"炎症や神経伝達に関与するアミン"},{"id":3,"category":"生理活性物質","question":"ロイコトリエンの特徴を答えよ。","answer":"白血球を遊走させるエイコサノイド"},{"id":4,"category":"生理活性物質","question":"ヒドロコルチゾンの特徴を答えよ。","answer":"抗炎症作用・代謝作用に関与するステロイド"},{"id":5,"category":"生理活性物質","question":"血液中で作られ、強い発痛作用を示すペプチドは何か。","answer":"ブラジキニン"},{"id":6,"category":"生理活性物質","question":"ブラジキニンの発痛作用を増強するエイコサノイドは何か。","answer":"プロスタグランジン"},{"id":7,"category":"生理活性物質","question":"血小板凝集を起こすエイコサノイドは何か。","answer":"トロンボキサンA₂"},{"id":8,"category":"生理活性物質","question":"血管収縮に関与するペプチドは何か。","answer":"アンジオテンシンII"},{"id":9,"category":"抗炎症薬・関連薬","question":"アスピリンの作用点と作用を答えよ。","answer":"シクロオキシゲナーゼ（COX）の抑制"},{"id":10,"category":"抗炎症薬・関連薬","question":"プレガバリンの作用点と作用を答えよ。","answer":"電位依存性Ca²⁺チャネルの抑制"},{"id":11,"category":"抗炎症薬・関連薬","question":"トリアムシノロンの作用点と作用を答えよ。","answer":"細胞内受容体（ステロイドホルモン受容体）の活性化"},{"id":12,"category":"抗炎症薬・関連薬","question":"クロルフェニラミンの作用点と作用を答えよ。","answer":"ヒスタミンH₁受容体の抑制"},{"id":13,"category":"抗炎症薬・関連薬","question":"プロドラッグ型の抗炎症薬を1つ答えよ。","answer":"ロキソプロフェン"},{"id":14,"category":"抗炎症薬・関連薬","question":"ロキソプロフェンがプロドラッグである利点を答えよ。","answer":"胃粘膜に到達した段階では活性が低く、胃潰瘍などを起こしにくい"},{"id":15,"category":"抗炎症薬・関連薬","question":"ステロイド性抗炎症薬を長期投与したとき、副腎皮質に起こる作用は何か。","answer":"副腎萎縮"},{"id":16,"category":"抗炎症薬・関連薬","question":"ステロイド性抗炎症薬による副腎萎縮への対策は何か。","answer":"投与量を徐々に低下させる（漸減する）"},{"id":17,"category":"抗炎症薬・関連薬","question":"妊婦への酸性NSAIDs投与で問題となる副作用を1つ答えよ（胎児循環）。","answer":"胎児の肺高血圧"},{"id":18,"category":"抗炎症薬・関連薬","question":"妊婦への酸性NSAIDs投与で問題となる副作用を1つ答えよ（分娩）。","answer":"分娩遅延"},{"id":19,"category":"抗炎症薬・関連薬","question":"COX-2を特異的に抑制するNSAIDを1つ答えよ。","answer":"セレコキシブ"},{"id":20,"category":"抗炎症薬・関連薬","question":"アルドステロン様作用のないステロイド性抗炎症薬を1つ答えよ。","answer":"トリアムシノロン または ベタメタゾン"},{"id":21,"category":"抗炎症薬・関連薬","question":"資料上、小児や妊婦に使用できない抗炎症薬として挙げられている薬物は何か。","answer":"ジクロフェナク"},{"id":22,"category":"抗炎症薬・関連薬","question":"アスピリン喘息の既往がある患者に使用できる解熱鎮痛薬として、資料に挙げられている薬物は何か。","answer":"シメトリド"},{"id":23,"category":"アレルギー治療薬","question":"ヒスタミン遊離抑制薬を1つ答えよ。","answer":"クロモグリク酸"},{"id":24,"category":"アレルギー治療薬","question":"第1世代H₁受容体拮抗薬の副作用を2つ答えよ。","answer":"ドライマウス、眠気"},{"id":25,"category":"アレルギー治療薬","question":"第2世代H₁受容体拮抗薬は、第1世代と比べて抗コリン作用がどうなっているか。","answer":"抗コリン作用が弱く、口腔乾燥が起こりにくい"},{"id":26,"category":"アレルギー治療薬","question":"第2世代H₁受容体拮抗薬は、第1世代と比べて血液脳関門をどう通過するか。","answer":"血液脳関門を通りにくく、眠気が起こりにくい"}];
const KEY='pharm_inflammation_simple_v1';
let memoryState=null, storageOK=true;
function defaultState(){return {status:{},filter:'all',category:'all',order:'normal',shuffleIds:[],currentId:1}}
function validStatus(v){return v==='known'||v==='unknown'}
function sanitize(raw){const d=defaultState();if(!raw||typeof raw!=='object')return d;if(raw.status&&typeof raw.status==='object'){for(const [k,v] of Object.entries(raw.status)){const n=Number(k);if(Number.isInteger(n)&&QUESTIONS.some(q=>q.id===n)&&validStatus(v))d.status[n]=v}}if(['all','unseen','unknown'].includes(raw.filter))d.filter=raw.filter;if(['all','生理活性物質','抗炎症薬・関連薬','アレルギー治療薬'].includes(raw.category))d.category=raw.category;if(['normal','shuffle'].includes(raw.order))d.order=raw.order;if(Array.isArray(raw.shuffleIds))d.shuffleIds=raw.shuffleIds.map(Number).filter((n,i,a)=>QUESTIONS.some(q=>q.id===n)&&a.indexOf(n)===i);if(Number.isInteger(Number(raw.currentId)))d.currentId=Number(raw.currentId);return d}
function loadState(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');const raw=localStorage.getItem(KEY);return raw?sanitize(JSON.parse(raw)):defaultState()}catch(e){storageOK=false;showNotice('この表示環境では端末保存が使えません。問題は利用できますが、画面を閉じると判定が消える可能性があります。');return memoryState||defaultState()}}
let state=loadState();
function saveState(){state=sanitize(state);memoryState=state;try{if(storageOK)localStorage.setItem(KEY,JSON.stringify(state))}catch(e){storageOK=false;showNotice('端末保存に失敗しました。バックアップの書き出しを利用してください。')}}
function showNotice(msg){const e=document.getElementById('storageNotice');e.textContent=msg;e.classList.add('show')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function ensureShuffle(){const ids=QUESTIONS.map(q=>q.id);if(state.shuffleIds.length!==ids.length||ids.some(id=>!state.shuffleIds.includes(id)))state.shuffleIds=shuffle(ids)}
function getList(){let list=QUESTIONS.filter(q=>state.category==='all'||q.category===state.category);if(state.filter==='unseen')list=list.filter(q=>!state.status[q.id]);if(state.filter==='unknown')list=list.filter(q=>state.status[q.id]==='unknown');if(state.order==='shuffle'){ensureShuffle();const rank=new Map(state.shuffleIds.map((id,i)=>[id,i]));list.sort((a,b)=>rank.get(a.id)-rank.get(b.id))}else list.sort((a,b)=>a.id-b.id);return list}
let revealed=false;
function currentIndex(list){let i=list.findIndex(q=>q.id===state.currentId);if(i<0&&list.length){i=0;state.currentId=list[0].id;saveState()}return i}
function render(){const list=getList();const idx=currentIndex(list);const card=document.getElementById('card'),empty=document.getElementById('empty');document.getElementById('totalCount').textContent=list.length;const judged=Object.values(state.status).filter(validStatus).length;const unknown=Object.values(state.status).filter(v=>v==='unknown').length;document.getElementById('judgedCount').textContent=judged;document.getElementById('unknownCount').textContent=unknown;const pct=Math.round(judged/QUESTIONS.length*100);document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent='判定済み '+pct+'%';document.getElementById('filter').value=state.filter;document.getElementById('category').value=state.category;document.getElementById('order').value=state.order;if(!list.length){card.style.display='none';empty.style.display='block';document.getElementById('positionText').textContent='0 / 0';document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').disabled=true;return}card.style.display='block';empty.style.display='none';const q=list[idx];document.getElementById('catPill').textContent=q.category;document.getElementById('qNo').textContent='Q'+q.id+'｜'+(idx+1)+' / '+list.length;document.getElementById('question').textContent=q.question;document.getElementById('answerText').textContent=q.answer;document.getElementById('positionText').textContent=(idx+1)+' / '+list.length;document.getElementById('prevBtn').disabled=idx===0;document.getElementById('nextBtn').disabled=idx===list.length-1;revealed=false;document.getElementById('answer').classList.remove('show');document.getElementById('judge').classList.remove('show');document.getElementById('revealBtn').style.display='block';document.getElementById('revealBtn').textContent='解答を見る';}
function go(delta){const list=getList();if(!list.length)return;const idx=currentIndex(list);const n=Math.max(0,Math.min(list.length-1,idx+delta));state.currentId=list[n].id;saveState();render();window.scrollTo({top:0,behavior:'smooth'})}
function setJudgment(value){const id=state.currentId;if(value!=='known'&&value!=='unknown')return;state.status[id]=value;saveState();if(state.filter==='unseen'||(state.filter==='unknown'&&value==='known')){render();return}const list=getList();const idx=currentIndex(list);if(idx>=0&&idx<list.length-1){state.currentId=list[idx+1].id;saveState()}render()}
document.getElementById('revealBtn').addEventListener('click',()=>{revealed=!revealed;document.getElementById('answer').classList.toggle('show',revealed);document.getElementById('judge').classList.toggle('show',revealed);document.getElementById('revealBtn').textContent=revealed?'解答を隠す':'解答を見る'});
document.getElementById('knownBtn').addEventListener('click',()=>setJudgment('known'));
document.getElementById('unknownBtn').addEventListener('click',()=>setJudgment('unknown'));
document.getElementById('prevBtn').addEventListener('click',()=>go(-1));document.getElementById('nextBtn').addEventListener('click',()=>go(1));
for(const id of ['filter','category','order'])document.getElementById(id).addEventListener('change',e=>{state[id]=e.target.value;if(id==='order'&&state.order==='shuffle')state.shuffleIds=shuffle(QUESTIONS.map(q=>q.id));saveState();render()});
document.getElementById('resetFilter').addEventListener('click',()=>{state.filter='all';state.category='all';state.order='normal';state.currentId=1;saveState();render()});
document.getElementById('reshuffleBtn').addEventListener('click',()=>{state.order='shuffle';state.shuffleIds=shuffle(QUESTIONS.map(q=>q.id));state.currentId=state.shuffleIds[0];saveState();render()});
document.getElementById('exportBtn').addEventListener('click',()=>{const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),state:sanitize(state)},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='炎症と抗炎症薬_学習データ.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)});
document.getElementById('importFile').addEventListener('change',async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;try{const obj=JSON.parse(await f.text());state=sanitize(obj.state||obj);saveState();render();alert('学習データを読み込みました。')}catch(err){alert('読み込めないファイルです。')}e.target.value=''});
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('「わかった・分からなかった」の記録をすべて消しますか？')){state=defaultState();saveState();render()}});
render();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body></html>
